{% extends 'tienda/base.html' %}
{% load static %}

{% block contenido %}

<style>
.editar-box{
    max-width:700px;
    margin:50px auto;
    background:white;
    padding:35px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.editar-box h2{
    text-align:center;
    margin-bottom:25px;
    font-size:32px;
}

.avatar-previo{
    text-align:center;
    margin-bottom:25px;
}

.avatar-previo img{
    width:130px;
    height:130px;
    object-fit:cover;
    border-radius:50%;
    border:4px solid #A8DADC;
}

form p{
    margin-bottom:18px;
}

form label{
    display:block;
    margin-bottom:6px;
    font-weight:600;
    color:#333;
}

form input,
form textarea{
    width:100%;
    padding:10px;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:15px;
    box-sizing:border-box;
}

form textarea{
    min-height:100px;
    resize:vertical;
}

.btn-guardar{
    background:#FFD6A5;
    border:none;
    padding:12px 22px;
    border-radius:12px;
    font-weight:600;
    cursor:pointer;
    transition:0.2s;
}

.btn-guardar:hover{
    background:#ffc98a;
}

.botones{
    margin-top:25px;
    text-align:center;
}
</style>

<div class="editar-box">

    <h2>Editar Perfil</h2>

    <div class="avatar-previo">
        {% if user.perfil.avatar %}
            <img src="{{ user.perfil.avatar.url }}">
        {% else %}
            <img src="{% static 'tienda/img/avatar.png' %}">
        {% endif %}
    </div>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}

        <div class="botones">
            <button type="submit" class="btn-guardar">
                Guardar Cambios
            </button>
        </div>
    </form>

</div>

{% endblock %}
