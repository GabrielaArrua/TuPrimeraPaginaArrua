{% extends 'tienda/base.html' %}

{% block contenido %}

<div style="max-width:700px; margin:auto; text-align:center; padding:20px;">

    <h2>{{ producto.nombre }}</h2>

    {% if producto.imagen %}
        <img src="{{ producto.imagen.url }}" style="max-width:100%; height:auto;">
    {% endif %}

    <p>{{ producto.descripcion }}</p>

    <h3 style="color:#A8DADC;">${{ producto.precio }}</h3>
    <p><strong>Código:</strong> {{ producto.codigo }}</p>
    <p><strong>Categoría:</strong> {{ producto.categoria }}</p>

    <br>

    <a href="/productos/" style="
        text-decoration:none;
        background:#FFD6A5;
        padding:12px 20px;
        border-radius:10px;
        color:black;
        font-weight:600;
    ">
        Volver a productos
    </a>

</div>

{% endblock %}
