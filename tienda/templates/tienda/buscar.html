{% extends 'tienda/base.html' %}

{% block contenido %}

<style>
.buscar-container {
    max-width: 600px;
    margin: 40px auto;
    text-align: center;
}

.buscar-input {
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    width: 60%;
}

.btn-buscar {
    padding: 10px 15px;
    border-radius: 8px;
    border: none;
    background: #FFD6A5;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.2s ease;
}

.btn-buscar:hover {
    background: #ffc98a;
}

.resultados {
    margin-top: 30px;
    text-align: left;
}

.card-resultado {
    background: white;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

.precio {
    color: #A8DADC;
    font-weight: bold;
}
</style>

<div class="buscar-container">

    <h2>Buscar producto 🔍</h2>

    <form method="GET">
        <input type="text" name="nombre" class="buscar-input" placeholder="Ej: pala, grip...">
        <button type="submit" class="btn-buscar">Buscar</button>
    </form>

    <div class="resultados">
        {% for producto in resultados %}
            <div class="card-resultado">
                <strong>{{ producto.nombre }}</strong><br>
                <span class="precio">${{ producto.precio }}</span>
            </div>
        {% empty %}
            <p>No se encontraron resultados.</p>
        {% endfor %}
    </div>

</div>

{% endblock %}
