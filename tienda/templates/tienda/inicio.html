{% extends 'tienda/base.html' %}

{% block contenido %}

<style>
.hero {
    height: 80vh;
    background-image: url("https://images.unsplash.com/photo-1554068865-24cecd4e34b8?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D");
    background-size: cover;
    background-position: center;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
}

/* capa oscura para que el texto se lea mejor */
.hero::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: linear-gradient(
    rgba(0,0,0,0.5),
    rgba(0,0,0,0.3)
);
}

.hero-content {
    position: relative;
    text-align: center;
    color: white;
}

.hero h1 {
    font-size: 56px;
    font-weight: 700;
}

.hero p {
    font-size: 20px;
}

.btn-home {
    background: #FFD6A5;
    border: none;
    padding: 14px 26px;
    border-radius: 12px;
    text-decoration: none;
    color: black;
    font-weight: 600;
    transition: all 0.2s ease;
}

.btn-home:hover {
    background: #ffc98a;
    transform: translateY(-2px);
    box-shadow: 0 6px 15px rgba(0,0,0,0.2);
}

</style>

<div class="hero">
    <div class="hero-content">
        <h1>Bienvenidos a SmashUy 🎾</h1>
        <p>Todo lo que necesitas para Beach Tennis, Pádel y Tenis</p>

        <a href="/productos/" class="btn-home">
            Ver productos
        </a>
    </div>
</div>

{% endblock %}
